name: Build Executables

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            executable_name: MBMSCD-Linux
            artifact_name: mbmscd-linux
          - os: windows-latest
            executable_name: MBMSCD-Windows.exe
            artifact_name: mbmscd-windows
          - os: macos-latest
            executable_name: MBMSCD-macOS
            artifact_name: mbmscd-macos

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Best compatibility for PyInstaller
        cache: 'pip'

    - name: Install System Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk tcl-dev tk-dev python3-pil.imagetk

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Executable
      run: python build_exe.py

    - name: Rename Executable (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: mv dist/SoundCloudDownloader dist/${{ matrix.executable_name }}

    - name: Rename Executable (Windows)
      if: matrix.os == 'windows-latest'
      run: Rename-Item -Path "dist\SoundCloudDownloader.exe" -NewName "${{ matrix.executable_name }}"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.executable_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist-artifacts
        merge-multiple: true

    - name: List Artifacts
      run: ls -la dist-artifacts/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist-artifacts/*
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}